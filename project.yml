name: MouseSmooth
options:
  bundleIdPrefix: com.mousesmooth
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    # We intentionally do NOT enable App Sandbox.
    # Reversing scroll for the mouse only requires a CGEventTap,
    # which is incompatible with the sandbox. See README for details.

targets:
  MouseSmooth:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    # Explicit Info.plist via XcodeGen — Xcode's INFOPLIST_KEY_* build
    # settings only support a whitelisted subset of keys, and CFBundleIconFile
    # isn't on it. Owning the plist lets us put any key we need.
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Mouse Smooth"
        CFBundleIconFile: AppIcon
        # XcodeGen's default Info.plist sets these to 1.0/1. We override
        # them so the bundle version matches MARKETING_VERSION above.
        CFBundleShortVersionString: "0.1.1"
        CFBundleVersion: "2"
        NSHumanReadableCopyright: "Copyright © 2026 Mouse Smooth contributors. MIT License."
        NSAccessibilityUsageDescription: "Mouse Smooth needs Accessibility access to observe and modify scroll events from your external mouse."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mousesmooth.MouseSmooth
        PRODUCT_NAME: MouseSmooth
        # The XcodeGen info: block above generates the Info.plist; we must
        # disable Xcode's own auto-generation so the two don't collide.
        GENERATE_INFOPLIST_FILE: NO
